<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haze Maze</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">Haze Maze</div>
        <p class="topbar-copy">Arrow keys or WASD</p>
      </header>

      <main class="layout">
        <section class="game-area">
          <canvas id="gameCanvas"></canvas>

          <aside class="sidebar hidden" id="modePanel">
            <div class="status-stack">
              <span id="levelLabel"></span>
              <span id="modeLabel"></span>
            </div>
            <div class="mode-buttons">
              <button class="mode-btn" data-mode="easy">Before</button>
              <button class="mode-btn" data-mode="medium">Collapse</button>
              <button class="mode-btn" data-mode="hard">After</button>
            </div>
          </aside>

          <div class="overlay menu-overlay" id="menuScreen">
            <div class="card intro-card">
              <h1>Haze Maze</h1>
              <p class="muted intro-copy">A world in three conditions.</p>
              <div class="menu-modes" id="menuModes">
                <button class="menu-mode active" data-mode="easy">Before</button>
                <button class="menu-mode" data-mode="medium">Collapse</button>
                <button class="menu-mode" data-mode="hard">After</button>
              </div>
              <p class="hint">Find the exit. Walls reveal themselves only through impact.</p>
            </div>
          </div>

          <div class="overlay hidden" id="levelCompleteOverlay">
            <div class="card">
              <h2>Level Complete</h2>
            </div>
          </div>

          <div class="overlay hidden" id="gameCompleteOverlay">
            <div class="card">
              <h2>You Escaped Every Maze</h2>
              <button id="newGameBtn" class="btn">New Game</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
